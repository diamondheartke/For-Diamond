<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>For Diamond 💎</title>

<link rel="stylesheet" href="styles.css">
</head>

<body>

<header>
    <div class="nav-left">
        <button onclick="showPage('home')">🏠 Home</button>
        <button onclick="showPage('about')">ℹ️ About</button>
    </div>

    <div class="diamond-card">
        💎 For Diamond
    </div>
</header>

<!-- HOME PAGE -->
<div id="home" class="container">
    <h1>Support Diamond 💖</h1>
    <p>Enter any amount you'd like to donate</p>

    <input type="number" id="amount" placeholder="Enter amount">

    <br>

    <button class="donate" onclick="donate()">💖 Donate</button>

    <p id="message"></p>
</div>

<!-- ABOUT PAGE -->
<div id="about" class="container hidden">
    <h1>About 💎</h1>
    <p>This is a simple donation page created for Diamond.</p>
    <p>Built with HTML, CSS, and JavaScript 🚀</p>
</div>

<script src="script.js"></script>
</body>
  </html>
